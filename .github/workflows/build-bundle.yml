name: Build Bundle

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build JS Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run build --release-branch main --build-minify

      - name: List output
        run: ls -la dist/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HASH=$(git rev-parse --short HEAD)
          TAG="v0.1.0-${HASH}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "Zancord Bundle v0.1.0 ($HASH)" \
            --notes "Initial build of the Zancord JS bundle for Discord mobile." \
            --latest \
            dist/*.js

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zancord-bundle
          path: dist/*.js
          if-no-files-found: error
